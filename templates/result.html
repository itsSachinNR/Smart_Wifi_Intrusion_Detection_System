<!DOCTYPE html>
<html>
<head>
    <title>Detection Results</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 36px;
        }

        .card {
            background: #1c1c1c;
            border-radius: 12px;
            padding: 18px;
            margin: 15px auto;
            width: 60%;
            box-shadow: 0 0 15px rgba(0,0,0,0.6);
            text-align: left;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .low {
            border-left: 6px solid #2ecc71;
        }

        .medium {
            border-left: 6px solid #f39c12;
        }

        .high {
            border-left: 6px solid #e74c3c;
        }

        .label {
            font-weight: bold;
            color: #00c6ff;
        }

        ul {
            margin-top: 5px;
            padding-left: 20px;
        }

        li {
            margin-bottom: 4px;
        }

        a {
            color: #00c6ff;
            text-decoration: none;
            font-size: 18px;
        }

        a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #bbb;
        }
    </style>
</head>

<body>

    <h1>🔍 Detection Results</h1>

    {% for item in results %}
        <div class="card 
            {% if item.risk == 'LOW RISK' %}low
            {% elif item.risk == 'MEDIUM RISK' %}medium
            {% else %}high
            {% endif %}
        ">

            <p><span class="label">📱 Device:</span> {{ item.device_mac }}</p>
            <p><span class="label">📊 Score:</span> {{ item.score }}</p>
            <p><span class="label">⚠ Risk:</span> {{ item.risk }}</p>

            <p class="label">🧠 Reasons:</p>
            <ul>
                {% for r in item.reasons %}
                    <li>{{ r }}</li>
                {% endfor %}
            </ul>

        </div>
    {% endfor %}

    <br>
    <a href="/">⬅ Back to Home</a>

    <div class="footer">
        Smart WiFi IDS | Detection Complete
    </div>

</body>
</html>
