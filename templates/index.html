<!DOCTYPE html>
<html>
<head>
    <title>Smart WiFi IDS</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #141e30, #243b55);
            color: white;
            text-align: center;
        }

        /* Navbar */
        .navbar {
            background: rgba(0,0,0,0.4);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-weight: bold;
            font-size: 20px;
            color: #00c6ff;
        }

        .tagline {
            font-size: 14px;
            color: #ccc;
        }

        /* Main container */
        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 44px;
            margin-bottom: 15px;
        }

        p {
            font-size: 18px;
            color: #ddd;
            margin-bottom: 35px;
        }

        /* Card style */
        .card {
            background: rgba(0,0,0,0.4);
            padding: 40px;
            border-radius: 12px;
            width: 50%;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Button */
        button {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #00c6ff;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="brand">📡 Smart WiFi IDS</div>
        <div class="tagline">Cybersecurity Project</div>
    </div>

    <!-- Main -->
    <div class="container">
        <div class="card">
            <h1>WiFi Intrusion Detection</h1>
            <p>Analyze and detect suspicious network activities using intelligent risk scoring</p>

            <form action="/analyze" method="get">
                <button type="submit">🚀 Run Detection</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        © 2026 Smart WiFi IDS | Built for Demo
    </div>

</body>
</html>
